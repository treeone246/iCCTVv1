name: PPE Monitor Docker CI/CD

on:
  pull_request:
    paths:
      - "ppe_monitor/**"
      - ".github/workflows/ppe-monitor-docker-ci.yml"
  push:
    branches:
      - main
    paths:
      - "ppe_monitor/**"
      - ".github/workflows/ppe-monitor-docker-ci.yml"
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./ppe_monitor
          file: ./ppe_monitor/Dockerfile.rtx
          load: true
          tags: ppe-monitor:ci-rtx

      - name: Run smoke tests inside container
        run: |
          docker run --rm ppe-monitor:ci-rtx python3 -m compileall app
          docker run --rm ppe-monitor:ci-rtx python3 -m pytest tests/test_state_machine.py tests/test_association.py -q

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ppe-monitor
          tags: |
            type=raw,value=rtx-latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ppe_monitor
          file: ./ppe_monitor/Dockerfile.rtx
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
