video:
  source: "videos/simulationTest2.mp4"
  target_fps: 20
  drop_grab_limit: 3

runtime:
  backend: "python"  # options: python, deepstream

deepstream:
  enabled: false
  # Multi-camera Phase 2:
  # - if source_uris is non-empty, it is used.
  # - otherwise source_uri (or video.source fallback) is used as single source.
  source_uris: []
  camera_ids: []
  source_uri: ""
  onnx_fallback_path: "models/best2.onnx"
  labels_path: "configs/deepstream/labels_ppe.txt"
  batch_size: 1
  width: 1280
  height: 720
  live_source: true
  gie_config: "configs/deepstream/config_infer_primary_yolo.txt"
  tracker_config: "configs/deepstream/config_tracker_NvDCF.yml"
  tracker_ll_lib_file: "/opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so"
  engine_path: "models/best2.engine"
  person_classes: [person]
  # Optional explicit class-id->label map if obj_label is not populated as expected.
  label_map: {}
  output_metadata_topic: "frame_payload"
  enable_osd: false
  enable_display: false
  drop_frame_interval: 0
  target_fps: 30
  camera_id: "rig_floor_cam_01"
  emit_jpeg: true
  jpeg_quality: 75
  jpeg_interval: 1
  appsink_max_buffers: 4

models:
  pose: models/yolo26n-pose.onnx
  ppe: models/best2.onnx
  verifier: models/yoloe-ppeRev2.onnx
  verifier_task: segment
  allow_mock_models: true

ppe_label_aliases:
  helmet: [helmet, hardhat, hard_hat, helmet_hardhat, helmet/hardhat, hard hat]
  goggles: [goggles, safety_glasses, safety glasses, glasses, goggles/glasses, safety glasses protective eyewear, safety glasses or goggles protective eyewear]
  gloves: [gloves, glove, hand_gloves, hand_glove, work glove safety glove, work_glove_safety_glove]
  boots: [boots, boot, safety_boots, safety shoes, safety_shoes, shoes, boots/shoes, safety boot work boot, safety_boot_work_boot]
  coverall: [coverall, coveralls, overall, overalls, industrial coverall jumpsuit, industrial_coverall_jumpsuit]
  no_gloves: [hands not using gloves, hands_not_using_gloves, no_gloves]
  no_boots: [socks not wearing safety boots, socks_not_wearing_safety_boots, no_boots]
  harness: [safety harness used on person, safety_harness_used_on_person, harness]

inference:
  device: auto
  conf_threshold_pose: 0.25
  conf_threshold_ppe: 0.22
  conf_threshold_verifier: 0.45
  per_item_conf_thresholds:
    harness: 0.70
  keypoint_conf_floor: 0.30
  imgsz: 640

detector_ensemble:
  enabled: true
  fusion_mode: parallel
  yoloe_conf_threshold: 0.20
  iou_nms_threshold: 0.50
  allowed_items: [helmet, goggles, gloves, boots, coverall, no_gloves, no_boots, harness]

verifier:
  backend: ollama_hybrid
  enable_vlm: true
  ollama:
    host: "http://127.0.0.1:11434"
    model: "qwen2.5vl:3b"
    timeout_seconds: 8.0
    temperature: 0.0
  conflict_resolver:
    min_iou: 0.05
    ambiguity_margin: 0.12
    low_conf_threshold: 0.40
  low_conf_escalation:
    enabled: true
    threshold: 0.40
    items: [gloves]
    per_item_thresholds:
      gloves: 0.40
  # Controls when positive/negative detector classes should escalate to VLM.
  label_polarity:
    helmet:
      positive: [helmet]
      negative: []
    goggles:
      positive: [goggles]
      negative: []
    gloves:
      positive: [gloves]
      negative: [no_gloves]
    boots:
      positive: [boots]
      negative: [no_boots]
    coverall:
      positive: [coverall]
      negative: []
  # Human-readable class names used in the VLM prompt.
  vlm_labels:
    helmet:
      positive: "hard hat"
      negative: "not wearing hard hat"
    goggles:
      positive: "safety glasses or goggles protective eyewear"
      negative: "not wearing safety glasses or goggles"
    gloves:
      positive: "work glove safety glove"
      negative: "hands not using gloves"
    boots:
      positive: "safety boot work boot"
      negative: "socks not wearing safety boots"
    coverall:
      positive: "industrial coverall jumpsuit"
      negative: "not wearing coverall"

adaptive_scheduler:
  # Reduce detector load by reusing PPE detections between frames.
  enabled: true
  # Run full PPE detection every N frames.
  ppe_interval_frames: 2
  # Hard cap to avoid stale reuse.
  max_detection_staleness_frames: 4
  # Force fresh detection when new track IDs appear.
  force_on_new_track: true

async_verifier:
  # Offload verifier crop checks to background worker so frame loop is not blocked.
  enabled: true
  queue_max: 512
  # If queue is full, keep frame loop non-blocking and emit queue_full reason.
  drop_if_full: true

association:
  keypoint_conf_floor: 0.30
  held_distance_ratio: 1.2
  held_items: [helmet, goggles, gloves]
  goggles_face_gate_enabled: true
  goggles_face_min_points: 2
  helmet_keypoints: [nose, left_eye, right_eye]
  goggles_keypoints: [left_eye, right_eye]
  gloves_keypoints: [left_wrist, right_wrist]
  boots_keypoints: [left_ankle, right_ankle]
  coverall_keypoints: [left_shoulder, right_shoulder, left_hip, right_hip]
  helmet_distance_px: 90
  goggles_distance_px: 85
  gloves_distance_px: 110
  boots_distance_px: 120
  coverall_iou_threshold: 0.05

verifier_cache:
  ttl_compliant_seconds: 8
  ttl_violation_seconds: 3
  ttl_indeterminate_seconds: 1.5

verifier_roi:
  keypoint_conf_floor: 0.40
  min_side_px: 96
  padding_scale:
    helmet: 2.0
    goggles: 1.8
    gloves: 1.6
    boots: 1.6
    coverall: 1.25

state_machine:
  # Vote-based anti-spam policy:
  # - keep last 30 frame votes
  # - >=20 violation-like votes => candidate
  # - candidate stable 2s => confirmed
  # - alert is sent once, then 60s cooldown before another send
  # - any compliant frame refreshes/reset timers for this item
  window_size: 30
  violation_threshold: 40
  clear_threshold: 1
  confirm_seconds: 2.0
  cooldown_seconds: 60.0

status_stability:
  # Display-state smoothing (live window + web UI) to reduce flicker/spam.
  compliant_enter_frames: 2
  compliant_clear_violation_frames: 3
  violation_enter_frames: 4
  indeterminate_enter_frames: 8
  per_item:
    helmet:
      violation_enter_frames: 7
      indeterminate_enter_frames: 12
    coverall:
      violation_enter_frames: 7
      indeterminate_enter_frames: 12

compliance_memory:
  # Prior bias: workers are usually compliant, avoid flipping on noisy low-confidence detections.
  assume_compliant: true
  prior_compliant_score: 5.0
  decay: 0.96
  positive_gain: 1.0
  negative_gain: 1.25
  compliant_bonus: 1.0
  violation_penalty: 1.2
  indeterminate_decay: 0.985
  ok_threshold: 4.0
  bad_threshold: -4.0
  # Non-compliance gate: negative evidence must dominate positive evidence.
  dominance_ratio: 1.15
  dominance_min_negative: 2.5
  max_abs_score: 20.0

required_ppe:
  - helmet
  - goggles
  - gloves
  - boots
  - coverall

dashboard:
  jpeg_quality: 75
  jpeg_interval_frames: 1
  metrics_window_minutes: 60

compute_monitor:
  enabled: true
  # Estimated model cost (GFLOPs per inference). Tune with your measured models.
  pose_gflops_per_infer: 8.5
  ppe_gflops_per_infer: 20.0
  verifier_aux_gflops_per_infer: 20.0
  verifier_crop_gflops_per_infer: 20.0
  # Set this if you have a rough equivalent estimate per Ollama verifier call.
  verifier_ollama_gflops_per_infer: 0.0
  # Jetson preset (FP16 dense throughput):
  # - Orin Nano 8GB standard: ~8500 GFLOPS
  # - Orin Nano Super mode: ~17000 GFLOPS
  # Set to 0 to disable utilization percentage.
  device_peak_gflops: 8500.0

memory_monitor:
  enabled: true

performance_logging:
  enabled: true
  path: "outputs/performance_logs.jsonl"
  interval_seconds: 1.0
  queue_max: 5000
  include_jetson: true
  include_raw_metrics: true
  camera_id: "rig_floor_cam_01"

prometheus:
  enabled: true

jetson_exporter:
  enabled: true
  # mode:
  # - external: read from separate exporter URL
  # - local_jtop: read jtop directly in this app (uvicorn-only mode)
  mode: "local_jtop"
  url: "http://127.0.0.1:9100/metrics"
  timeout_seconds: 1.5
  refresh_seconds: 1.0
  fallback_to_local_jtop: true
  # Optional overrides if your exporter uses different metric names.
  metric_map: {}

face_gate:
  enabled: true
  target_item: "goggles"
  # shadow_mode logs observations without changing decision.
  shadow_mode: true
  # enforce applies gate result to output classification.
  enforce: false
  log_enabled: true
  log_every_n_frames: 10
  # Current backend expects SCRFD ONNX model.
  # TensorRT plan can still be used via external exporter/service workflow.
  scrfd_model_path: "models/det_2.5g.onnx"
  input_size: 640
  score_threshold: 0.35
  min_confidence: 0.45
  min_face_area_ratio: 0.02
  nms_iou_threshold: 0.40
  cache_seconds: 0.2

event_stream:
  enabled: true
  path: "outputs/detection_events.jsonl"
  camera_id: "rig_floor_cam_01"
  heartbeat_seconds: 1.0
  emit_on_raw_change: true
  emit_on_stable_change: true
  emit_on_sm_transition: true
  queue_max: 2000

behavior_agent:
  enabled: false
  interval_seconds: 10
  events_jsonl: "outputs/detection_events.jsonl"
  output_dir: "outputs/behavior_agent"
  memory_path: "outputs/person_behavior_memory.json"
  host: "http://127.0.0.1:11434"
  model: "qwen3:4b"
  max_recent_events: 30
  temperature: 0.1
  num_predict: 2048
  num_ctx: 8192
  strict_json: true
  update_memory: true
  min_identity_confidence: 0.65
  identity_switch_reid_threshold: 0.70
  save_training_records: true
  timeout_seconds: 90

logging:
  structured: true
